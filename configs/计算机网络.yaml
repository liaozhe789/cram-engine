key_points:
  - 计算机网络概述（三网融合、互联网特点、交换技术、性能指标）
  - 网络体系结构（五层协议、协议三要素、协议与服务、OSI/TCP/IP对比）
  - 物理层（接口特性、通信方式、编码方式、香农公式、复用技术）
  - 数据链路层（三个基本问题、CRC、PPP、CSMA/CD、MAC地址、VLAN）
  - 网络层（IP地址分类、CIDR、ARP、ICMP、IPv6、RIP/OSPF/BGP、NAT、VPN）
  - 运输层（TCP/UDP对比、端口号、停止等待协议、流量控制、拥塞控制、三次握手/四次挥手）
  - 应用层（DNS、HTTP、FTP、电子邮件协议、DHCP）
  - 计算题（时延计算、CRC、子网划分、CIDR最长前缀匹配、拥塞窗口变化）

