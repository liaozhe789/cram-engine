course: 数据结构
subject_type: engineering
textbook: "《数据结构》"
exam_types:
  - 选择题
  - 填空题
  - 简答题
  - 算法设计题
  - 综合应用题
key_points:
  - 算法时间复杂度分析
  - 算法空间复杂度分析
  - 顺序表的实现与基本操作
  - 单链表的定义与基本操作
  - 循环链表与双向链表
  - 顺序表与链表的比较
  - 链表的程序设计
  - 栈的定义与顺序栈实现
  - 链栈的表示与实现
  - 栈与递归
  - 循环队列（空与满的判断）
  - 链队的表示与实现
  - 串的存储结构与模式匹配算法
  - KMP算法与BF算法区别
  - next数组的求解
  - 特殊矩阵的压缩存储
  - 广义表的定义与存储结构
  - 二叉树的性质与存储结构
  - 二叉树的遍历（前序/中序/后序/层次）
  - 线索二叉树
  - 树与森林的转换
  - 哈夫曼树与哈夫曼编码
  - 二叉树高度/叶数/节点递归算法
  - 并查集及其应用
  - 图的存储结构（邻接矩阵/邻接表）
  - 图的遍历（DFS/BFS）
  - 最小生成树（Prim/Kruskal）
  - 最短路径（Dijkstra/Floyd）
  - 拓扑排序
  - 关键路径
  - 有向图是否有环的判断
  - 顺序查找/折半查找/分块查找
  - 二叉排序树
  - 平衡二叉树（AVL）
  - B-树与B+树
  - 散列表查找
  - 除留余数法
  - 处理冲突的方法（开放地址/链地址法）
  - 平均查找长度计算
  - 插入排序（直接/折半/希尔）
  - 交换排序（冒泡/快速排序）
  - 选择排序（简单选择/堆排序）
  - 归并排序
  - 基数排序
  - 各排序算法时间/空间复杂度对比
