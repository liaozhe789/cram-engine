course: 信息安全数学基础
subject_type: math
language: zh
textbook: "信息安全数学基础"
exam_types:
  - 单项选择题
  - 填空题
  - 计算题
  - 证明题
chapters:
  - name: 第1章 整数的可除性
    range: "1-5"
  - name: 第2章 同余
    range: "6-12"
  - name: 第3章 一次同余方程
    range: "13-18"
  - name: 第4章 二次同余
    range: "19-22"
  - name: 第5章 原根和离散对数
    range: "23-27"
  - name: 第6章 近世代数基础
    range: "28-30"
  - name: 第7章 椭圆曲线基础
    range: "31-32"
key_points:
  - 整除与带余除法
  - 最大公因数与辗转相除法
  - 扩展辗转相除法与贝祖等式
  - 最小公倍数
  - 算术基本定理与标准分解式
  - 同余的基本性质
  - 完全剩余系
  - 简化剩余系
  - 欧拉函数
  - 欧拉定理
  - 费马小定理及应用
  - 模幂运算与平方-乘算法
  - 一次同余方程求解
  - 逆元求解（扩展辗转相除法）
  - 中国剩余定理 CRT
  - 一次同余方程组与解数
  - 仿射密码算法
  - RSA公钥密码算法（加密/解密/密钥生成/正确性证明）
  - 二次同余与二次剩余
  - 勒让德符号
  - 欧拉判别法
  - 二次互反律
  - 原根与阶的定义及性质
  - 原根阶的证明
  - 素数的原根求解
  - 离散对数
  - ElGamal密码算法
  - 群的基本概念
  - 环与域基础
  - 有限域基本概念
  - 椭圆曲线基本概念与Weierstrass方程
  - 椭圆曲线在密码学中的应用
must_know_ids:
  - "1-5"
  - "7-16"
  - "18-27"
preferences:
  language: zh
  grading_strictness: strict
  formula_rendering: latex
  exam_focus:
    chapters_1_5: "核心重点，占考试 90%+ 分值"
    chapters_6_7: "仅 2-3 道选择题，只考定义识别"
    elliptic_curve: "不出大题，无需掌握点加/倍点公式"