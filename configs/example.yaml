key_points:
  - Process vs Thread
  - Process States and PCB
  - CPU Scheduling Algorithms (FCFS/SJF/RR/Priority)
  - Preemptive vs Non-preemptive Scheduling
  - Critical Section Problem
  - Semaphores and Mutex
  - Deadlock Conditions
  - Banker's Algorithm
  - Memory Allocation (Contiguous/Paging/Segmentation)
  - Virtual Memory and Page Replacement (FIFO/LRU/Optimal)
  - TLB and Multi-level Page Tables
  - File System Structure (inode/FAT)
  - Disk Scheduling (FCFS/SSTF/SCAN/C-SCAN)
  - I/O Subsystem
