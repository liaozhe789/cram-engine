course: 数据库系统概论
language: zh
subject_type: mixed
textbook: "《数据库系统概论》（第6版）"
exam_types:
  - 选择题
  - 填空题
  - 简答题
  - SQL编写题
  - 范式分解题
  - ER图设计题
key_points:
  - 数据库的4个基本概念（数据/DB/DBMS/DBS）
  - 数据库管理系统的六个主要功能
  - 数据管理技术三个阶段的比较
  - 数据库系统阶段的数据特点（整体结构化、共享性、冗余度、独立性、统一管控）
  - 数据库系统的三级模式结构与两级映像
  - 数据模型的三要素（数据结构/操纵/完整性约束）
  - 层次模型与网状模型的数据结构
  - 关系模型的数据结构与术语
  - 域/笛卡尔积/关系/目或度
  - 关系模式及形式化表示（候选码/主码/主属性/非码属性/全码）
  - 关系的三种类型（基本关系/查询结果/视图）
  - 7种关系操作与5种基本操作
  - 关系数据语言分类（关系代数/SQL）
  - 实体完整性与参照完整性（外码/被参照关系/参照关系）
  - 传统的四种二目集合运算
  - 专门的关系运算（象集/自然连接/外连接）
  - 运用关系代数进行查询
  - SQL的三种功能（数据定义/数据操纵/数据控制）
  - SQL数据定义（模式/基本表/索引的创建删除修改）
  - SQL单表查询
  - SQL连接查询
  - SQL嵌套查询
  - SQL集合查询
  - SQL数据更新（INSERT/UPDATE/DELETE）
  - 空值处理
  - 视图的定义/查询/更新及作用
  - 数据库安全性概述与不安全因素
  - 用户身份鉴别方法（静态/动态/生物特征/智能卡）
  - 自主存取控制（GRANT/REVOKE）
  - 数据库角色
  - 强制存取控制方法
  - 视图机制与审计与加密
  - 实体完整性（PRIMARY KEY定义与检查）
  - 参照完整性（FOREIGN KEY定义与检查）
  - 用户定义的完整性（属性约束/元组约束）
  - 触发器（定义/执行/删除）
  - 函数依赖（完全/部分/传递）
  - 范式（1NF/2NF/3NF/BCNF/4NF）
  - 多值依赖
  - 数据库设计的基本步骤（需求分析→概念→逻辑→物理→实施→运维）
  - E-R模型（实体/属性/联系类型：1:1/1:N/M:N）
  - E-R图向关系模型的转换
  - 数据模型的优化（水平分解/垂直分解）
  - 数据库物理结构设计（存取方法/存储结构）
  - 数据库系统的组成（硬件平台/软件平台/人员）
  - 过程化SQL的块结构
  - 游标的定义与使用
  - 存储过程与存储函数的定义及区别
  - 事务的ACID特性
  - 故障的种类（事务内部故障/系统故障/介质故障）
  - 数据转储的方法与特点
  - 日志文件的内容与登记原则
  - 恢复策略与检查点技术
